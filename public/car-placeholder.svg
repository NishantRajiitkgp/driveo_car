<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <rect width="480" height="320" fill="#111111"/>
  <!-- Road surface -->
  <rect x="0" y="240" width="480" height="80" fill="#1a1a1a"/>
  <line x1="0" y1="280" x2="480" y2="280" stroke="#333" stroke-width="1" stroke-dasharray="20 15"/>
  <!-- Shadow -->
  <ellipse cx="240" cy="242" rx="160" ry="12" fill="rgba(0,0,0,0.5)"/>
  <!-- Car body -->
  <path d="M80 200 L100 200 L120 160 L180 140 L300 140 L360 160 L380 200 L400 200 L400 220 L395 230 L85 230 L80 220 Z" fill="#8a8a8a"/>
  <!-- Roof -->
  <path d="M140 160 L175 120 L310 120 L345 160 Z" fill="#7a7a7a"/>
  <!-- Windows -->
  <path d="M150 155 L178 125 L235 125 L235 155 Z" fill="#2a4a6a"/>
  <path d="M245 155 L245 125 L305 125 L340 155 Z" fill="#2a4a6a"/>
  <!-- Windshield reflection -->
  <path d="M155 150 L180 128 L200 128 L175 150 Z" fill="rgba(255,255,255,0.1)"/>
  <!-- Front bumper -->
  <path d="M80 200 L80 225 L100 230 L100 200 Z" fill="#666"/>
  <!-- Rear bumper -->
  <path d="M380 200 L400 200 L400 225 L380 230 Z" fill="#666"/>
  <!-- Front wheel -->
  <circle cx="140" cy="230" r="28" fill="#222"/>
  <circle cx="140" cy="230" r="22" fill="#333"/>
  <circle cx="140" cy="230" r="10" fill="#555"/>
  <circle cx="140" cy="230" r="4" fill="#444"/>
  <!-- Rear wheel -->
  <circle cx="340" cy="230" r="28" fill="#222"/>
  <circle cx="340" cy="230" r="22" fill="#333"/>
  <circle cx="340" cy="230" r="10" fill="#555"/>
  <circle cx="340" cy="230" r="4" fill="#444"/>
  <!-- Headlight -->
  <rect x="82" y="195" width="18" height="10" rx="3" fill="#e8e8a0"/>
  <!-- Taillight -->
  <rect x="382" y="195" width="16" height="10" rx="3" fill="#E23232"/>
  <!-- Door line -->
  <line x1="240" y1="155" x2="240" y2="220" stroke="#6a6a6a" stroke-width="0.5"/>
  <!-- Hood line -->
  <path d="M120 160 L100 200" stroke="#6a6a6a" stroke-width="0.5"/>
  <!-- Trunk line -->
  <path d="M360 160 L380 200" stroke="#6a6a6a" stroke-width="0.5"/>
  <!-- Side mirror -->
  <rect x="148" y="162" width="8" height="5" rx="2" fill="#777"/>
</svg>